name: Secret Detection – PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    name: Scan PR commits for secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install TruffleHog
        run: bash .github/scripts/install-trufflehog.sh

      - name: TruffleHog scan (PR diff)
        id: trufflehog
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash .github/scripts/pr-scan.sh

      - name: LLM analysis (Claude)
        id: llm
        if: always()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python3 .github/scripts/pr-llm-analyze.py

      - name: Post PR comment
        if: always()
        uses: actions/github-script@v7
        env:
          LLM_RESULT: ${{ steps.llm.outputs.llm_result }}
          TRUFFLEHOG_COUNT: ${{ steps.trufflehog.outputs.findings_count }}
          VERDICT: ${{ steps.llm.outputs.verdict }}
        with:
          script: |
            const verdict  = process.env.VERDICT || 'unknown';
            const rawCount = parseInt(process.env.TRUFFLEHOG_COUNT) || 0;
            let llm = {};
            try { llm = JSON.parse(process.env.LLM_RESULT || '{}'); } catch (_) {}

            const icons    = { clean: '✅', suspicious: '⚠️', confirmed_secrets: '🚨', unknown: '❓' };
            const sevIcons = { critical: '🔴', high: '🟠', medium: '🟡', low: '🔵' };

            let body  = `## ${icons[verdict] ?? '❓'} Secret Detection Report\n\n`;
            body += `| Scanner | Result |\n|---------|--------|\n`;
            body += `| TruffleHog (raw) | ${rawCount} finding(s) |\n`;
            body += `| LLM verdict | **${verdict.replace(/_/g, ' ')}** |\n\n`;

            if (llm.summary) body += `**Summary:** ${llm.summary}\n\n`;

            const real = (llm.findings || []).filter(f => !f.is_false_positive);
            if (real.length > 0) {
              body += `### Confirmed Findings\n\n`;
              for (const f of real) {
                const sev = sevIcons[f.severity] ?? '⚪';
                body += `- ${sev} **${f.type}** _(${f.severity})_ — \`${f.location}\`\n  > ${f.reason}\n\n`;
              }
            }

            if (llm.recommendation) body += `**Recommendation:** ${llm.recommendation}\n\n`;

            body += `---\n_Scanned by TruffleHog v3 + Claude AI · `;
            body += `[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})_`;

            const existing = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            for (const c of existing.data) {
              if (c.user.login === 'github-actions[bot]' && c.body.includes('Secret Detection Report')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner, repo: context.repo.repo, comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body,
            });

      - name: Fail on confirmed secrets
        if: steps.llm.outputs.verdict == 'confirmed_secrets'
        run: |
          echo "::error::Confirmed secrets detected. See the PR comment for details."
          exit 1
