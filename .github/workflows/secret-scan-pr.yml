name: Secret Detection - PR & Push to Main

on:
  pull_request:
    types: [opened, synchronize, reopened]
  # Server-side safety net: catches anyone who pushed with --no-verify
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    name: TruffleHog scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install TruffleHog
        run: bash .github/scripts/install-trufflehog.sh

      # ── PR: scan only the commits introduced by this PR ──────────────────
      - name: TruffleHog scan (PR diff)
        id: scan
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash .github/scripts/pr-scan.sh

      # ── Push to main: scan the entire main branch codebase ──────────────
      - name: TruffleHog scan (push to main - full scan)
        if: github.event_name == 'push'
        run: |
          trufflehog git "file://." \
            --branch main \
            --json \
            --no-update \
            2>/dev/null > trufflehog-results.ndjson || true

          COUNT=$(grep -c '"DetectorName"' trufflehog-results.ndjson 2>/dev/null || true)
          COUNT=${COUNT:-0}
          echo "findings_count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "TruffleHog: $COUNT raw finding(s)"

      # ── Format results as a markdown table → step summary ────────────────
      - name: Format results table
        id: table
        if: always()
        run: |
          python3 .github/scripts/format-table.py trufflehog-results.ndjson table.md || true
          TABLE=$(cat table.md 2>/dev/null || echo "_No output_")
          # Make the table available to the comment step
          {
            echo "content<<EOF_TABLE"
            echo "$TABLE"
            echo "EOF_TABLE"
          } >> "$GITHUB_OUTPUT"

      # ── PR only: post / update a comment with the table ──────────────────
      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          TABLE: ${{ steps.table.outputs.content }}
        with:
          script: |
            const table   = process.env.TABLE || '_No results_';
            const runUrl  = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body    = `## 🔍 Secret Detection Report\n\n${table}\n\n---\n_TruffleHog v3 · [View run](${runUrl})_`;

            const existing = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            for (const c of existing.data) {
              if (c.user.login === 'github-actions[bot]' && c.body.includes('Secret Detection Report')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner, repo: context.repo.repo, comment_id: c.id,
                });
              }
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body,
            });

      # ── Fail the job if secrets were found ───────────────────────────────
      - name: Fail if secrets detected
        if: always()
        run: |
          COUNT=$(grep -c '"DetectorName"' trufflehog-results.ndjson 2>/dev/null || true)
          COUNT=${COUNT:-0}
          if [[ "$COUNT" -gt 0 ]]; then
            echo "::error::$COUNT secret(s) detected. Review the findings table above."
            exit 1
          fi
