name: Secret Detection – Scheduled Full-Repo Scan

on:
  schedule:
    - cron: '0 2 * * *'   # daily at 02:00 UTC
  workflow_dispatch:
    inputs:
      branch_filter:
        description: 'Branch pattern to scan (e.g. main, feature/*, leave blank for all)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  full-scan:
    name: Scan all branches for secrets
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all remote branches
        run: git fetch --all --prune

      - name: Install TruffleHog
        run: bash .github/scripts/install-trufflehog.sh

      - name: TruffleHog scan – all branches
        id: trufflehog
        env:
          BRANCH_FILTER: ${{ github.event.inputs.branch_filter }}
        run: bash .github/scripts/cron-scan.sh

      - name: LLM report generation (Claude)
        id: llm
        if: always()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TOTAL_FINDINGS: ${{ steps.trufflehog.outputs.total_findings }}
          BRANCH_COUNT: ${{ steps.trufflehog.outputs.branch_count }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 .github/scripts/cron-llm-report.py

      - name: Upload findings artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-findings-${{ github.run_id }}
          path: |
            findings-deduped.json
            all-findings.ndjson
          retention-days: 30

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_SECRET_SCAN_WEBHOOK }}
          LLM_REPORT: ${{ steps.llm.outputs.llm_report }}
          TOTAL_FINDINGS: ${{ steps.trufflehog.outputs.total_findings }}
          BRANCH_COUNT: ${{ steps.trufflehog.outputs.branch_count }}
          STATUS: ${{ steps.llm.outputs.status }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 .github/scripts/slack-notify.py
