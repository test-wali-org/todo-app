name: Secret Detection – Scheduled Full-Repo Scan

on:
  schedule:
    - cron: '0 2 * * *'   # daily at 02:00 UTC
  workflow_dispatch:
    inputs:
      branch_filter:
        description: 'Branch pattern to scan (e.g. main, feature/*, blank = all)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  full-scan:
    name: TruffleHog - all branches
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all remote branches
        run: git fetch --all --prune

      - name: Install TruffleHog
        run: bash .github/scripts/install-trufflehog.sh

      - name: TruffleHog scan - all branches
        id: scan
        env:
          BRANCH_FILTER: ${{ github.event.inputs.branch_filter }}
        run: bash .github/scripts/cron-scan.sh

      - name: Format results table
        if: always()
        run: python3 .github/scripts/format-table.py findings-deduped.json || true

      - name: Upload findings artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-findings-${{ github.run_id }}
          path: |
            findings-deduped.json
            all-findings.ndjson
          retention-days: 30

      - name: Fail if secrets detected
        if: always()
        run: |
          COUNT=$(python3 -c "import json; print(len(json.load(open('findings-deduped.json'))))" 2>/dev/null || echo "0")
          if [[ "$COUNT" -gt 0 ]]; then
            echo "::error::$COUNT unique secret(s) found across all branches. See the summary table above."
            exit 1
          fi
